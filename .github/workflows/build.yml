name: Build EXE

env:
  APP_NAME: "歌詞改行ツール"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

#
# GitHub Release作成に必要
#

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: ソース取得
        uses: actions/checkout@v4

      - name: バージョン取得
        shell: powershell
        run: |
          echo "VERSION=${env:GITHUB_REF_NAME}" >> $env:GITHUB_ENV

      - name: 開発版情報を作成
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $jst = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId(
            (Get-Date),
            "Tokyo Standard Time"
          )

          $date = $jst.ToString("yyyyMMdd_HHmm")

          "DEV_DATE=$date" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: PyInstallerインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: EXE作成
        shell: powershell
        run: |
          pyinstaller `
            --clean `
            --noconfirm `
            --onefile `
            --windowed `
            --name "$env:APP_NAME" `
            --icon "icon.ico" `
            "main.py"

      - name: 配布フォルダ作成
        shell: powershell
        run: |
          if ($env:GITHUB_REF -eq "refs/heads/main") {
            $folder = "release\$env:APP_NAME`_Dev_$env:DEV_DATE"
          }
          else {
            $folder = "release\$env:APP_NAME`_$env:VERSION"
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $folder

          Copy-Item `
            "dist\$env:APP_NAME.exe" `
            $folder

          Copy-Item `
            "icon.ico" `
            $folder

          Copy-Item `
            "Read me.txt" `
            $folder

          "RELEASE_FOLDER=$folder" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: テスト版をArtifactsに保存
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_Dev_${{ env.DEV_DATE }}
          path: ${{ env.RELEASE_FOLDER }}
          if-no-files-found: error

      - name: ZIP作成
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          Compress-Archive `
            -Path "$env:RELEASE_FOLDER\*" `
            -DestinationPath "$env:RELEASE_FOLDER.zip"

      - name: Release作成
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          name: ${{ env.APP_NAME }} ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true